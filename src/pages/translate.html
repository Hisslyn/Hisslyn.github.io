<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Translation Services | Azat Yeranosyan</title>
    <meta name="description" content="Request document, website, subtitle, or certified translation services.">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; form-action https://formspree.io">
    <link rel="stylesheet" href="../css/components/translate.min.css">
    <script defer src="../js/lang.min.js"></script>
</head>
<body>
    <a href="#main-content" class="skip-link">Skip to content</a>
    <main id="main-content">
        <div class="lang-switch">
            <img src="../../assets/icons/gb.png" alt="Switch to English" data-lang="en" class="lang-icon" width="32" height="20" tabindex="0" role="button">
            <img src="../../assets/icons/ru.png" alt="Switch to Russian" data-lang="ru" class="lang-icon" width="32" height="20" tabindex="0" role="button">
            <img src="../../assets/icons/am.png" alt="Switch to Armenian" data-lang="hy" class="lang-icon" width="32" height="20" tabindex="0" role="button">
        </div>

        <h1 id="page-title">Translation Services</h1>
        <p id="page-description">Select a service and describe your request below.</p>

        <form id="request-form" action="https://formspree.io/f/mwpkndan" method="POST">
            <input type="hidden" name="_next" value="https://hisslyn.github.io/src/pages/submitted-translate.html">

            <div id="requests-container">
                <div class="request-block">
                    <div class="request-buttons">
                        <button type="button" class="add-btn" aria-label="Add request">+</button>
                    </div>

                    <label id="label-service" data-i18n="labelService" for="service">Choose a translation service:</label>
                    <select id="service" name="service[]" required>
                        <option value="document">Document Translation – $1</option>
                        <option value="website">Website Translation – $2</option>
                        <option value="subtitles">Subtitle Translation – $3</option>
                        <option value="certified">Certified Translation – $5</option>
                        <option value="interpretation">Live Interpretation – $10</option>
                        <option value="other">Other</option>
                    </select>

                    <label id="label-description" data-i18n="labelDescription" for="description">Please describe what you want:</label>
                    <textarea id="description" name="description[]" rows="4" required></textarea>
                </div>
            </div>

            <p id="total-price">Your total price is: $0</p>
            <button type="submit" id="submit-button">Submit</button>
        </form>
    </main>
    <footer>
        <p>© 2026 Azat Yeranosyan | Built with HTML &amp; CSS</p>
    </footer>
    <audio id="bg-audio" muted playsinline preload="auto">
        <source src="../../assets/audio/Cosmic_Hippo_lavender.mp3" type="audio/mpeg">
    </audio>
    <button id="audio-toggle" type="button" aria-label="Unmute background music" aria-pressed="false">🔇</button>
    <button id="audio-volume" type="button" aria-label="Volume 10 percent, click to change">10%</button>
    <button id="audio-next" type="button" aria-label="Next track">⏭</button>
    <script src="../js/audio.min.js" defer></script>
    <div class="drawer" id="promo-drawer">
        <div id="drawer-panel" class="drawer__panel">
            <a href="cv.html"><img src="../../assets/images/Hire_me.gif" alt="Hire me" width="220" height="218" loading="lazy"></a>
        </div>
        <button id="drawer-toggle" class="drawer__toggle" type="button" aria-expanded="false" aria-controls="drawer-panel" aria-label="Open promo panel">&gt;</button>
    </div>
    <script src="../js/drawer.min.js" defer></script>
</body>
</html>
