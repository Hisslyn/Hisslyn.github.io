<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riot Project</title>
    <meta name="description" content="Look up League of Legends summoner stats by region.">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'">
    <link rel="stylesheet" href="../css/styles.min.css">
</head>

<body>
    <a href="#main-content" class="skip-link">Skip to content</a>
    <header class="dark-header">
        <div class="logo-container">
            <a href="index.html">
                <img src="../../assets/images/logo.webp" alt="Azat Yeranosyan – home" class="logo" width="100" height="100">
            </a>
        </div>
        <nav>
            <ul class="nav-links">
                <li><a href="cv.html">CV</a></li>
                <li><a href="merch.html">Merch</a></li>
                <li><a href="riotproject.html" class="active">Riot Project</a></li>
                <li><a href="projects.html">Projects</a></li>
                <li><a href="contactme.html">Contact Me</a></li>
            </ul>
        </nav>
    </header>
    <main id="main-content">
        <h1>Riot Project</h1>
        <form action="#" method="get">
          <fieldset>
            <legend class="visually-hidden">Summoner Lookup</legend>
            <div class="form-group">
              <label for="region">Region:</label>
              <select id="region" name="region" class="styled-dropdown" required>
                <option value="" disabled selected>Region</option>
                <option value="NA1">NA1</option>
                <option value="ME1">ME1</option>
                <option value="EUW1">EUW</option>
                <option value="EUN1">EUNE</option>
                <option value="OC1">OCE</option>
                <option value="KR1">KR1</option>
                <option value="JP1">JP1</option>
                <option value="BR1">BR1</option>
                <option value="LA2">LAS</option>
                <option value="LA1">LAN</option>
                <option value="RU">RU1</option>
                <option value="TR1">TR1</option>
                <option value="SG2">SG2</option>
                <option value="PH2">PH2</option>
                <option value="TW2">TW2</option>
                <option value="VN2">VN2</option>
                <option value="TH2">TH2</option>
              </select>
            </div>
            <div class="form-group">
              <label for="username">Summoner Name + #Tag:</label>
              <input type="text" id="username" name="username" placeholder="Summoner Name + #Tag" required>
            </div>
            <button type="submit" class="dark-theme-button">Submit</button>
          </fieldset>
        </form>
    </main>
    <footer>
        <p>© 2025 Azat Yeranosyan | Built with HTML &amp; CSS</p>
    </footer>
</body>
</html>
