<!DOCTYPE html>
<html lang="en">
<head>

    <title>Welcome</title>
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; form-action https://formspree.io">
    <link rel="stylesheet" href="../css/styles.min.css">
</head>

<body>
    <div class="logo-container">
        <a href="index.html">
            <img src="../../assets/images/logo.webp" alt="Logo" class="logo" width="100" height="100">
        </a>
    </div>
    <header class="dark-header">
      <nav>
        <ul class="nav-links">
          <li><a href="cv.html">CV</a></li>
          <li><a href="merch.html">Merch</a></li>
          <li><a href="riotproject.html">Riot Project</a></li>

          <li><a href="contactme.html" class="active">Contact Me</a></li>
        </ul>
      </nav>
    </header>
    <main>
    <section id="contact">
        <h2>Contact Me</h2>
        <p>Feel free to reach out to me using the form below:</p>
        <form id="contactForm" action="https://formspree.io/f/mwpkndan" method="POST">
            <div class="form-group">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" placeholder="Your Name" required>
            </div>
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" placeholder="Your Email" required>
            </div>
            <div class="form-group">
                <label for="message">Message:</label>
                <textarea id="message" name="message" placeholder="Your Message" rows="5" required></textarea>
                <button type="submit" class="dark-theme-button">Send Message</button>
            </div>
            <input type="text" name="_gotcha" class="visually-hidden" tabindex="-1" autocomplete="off">
        </form>
    </section>
    </main>
</body>
