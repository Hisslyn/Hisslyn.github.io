<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me | Azat Yeranosyan</title>
    <meta name="description" content="Get in touch with Azat Yeranosyan via the contact form.">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; form-action https://formspree.io">
    <link rel="stylesheet" href="../css/styles.min.css">
</head>
<body>
    <a href="#main-content" class="skip-link">Skip to content</a>
    <header class="dark-header">
        <div class="logo-container">
            <a href="index.html">
                <img src="../../assets/images/logo.webp" alt="Azat Yeranosyan – home" class="logo" width="100" height="100">
            </a>
        </div>
        <nav aria-label="Main navigation">
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="cv.html">CV</a></li>
                <li><a href="merch.html">Merch</a></li>
                <li><a href="riotproject.html">Riot Project</a></li>
                <li><a href="projects.html">Projects</a></li>
                <li><a href="contactme.html" class="active">Contact Me</a></li>
            </ul>
        </nav>
    </header>
    <main id="main-content">
        <section id="contact">
            <h1>Contact Me</h1>
            <p>Feel free to reach out to me using the form below:</p>
            <form id="contactForm" action="https://formspree.io/f/mwpkndan" method="POST">
                <div class="form-group">
                    <label for="name">Name:</label>
                    <input type="text" id="name" name="name" autocomplete="name" placeholder="Your Name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" autocomplete="email" placeholder="Your Email" required>
                </div>
                <div class="form-group">
                    <label for="message">Message:</label>
                    <textarea id="message" name="message" placeholder="Your Message" rows="5" required></textarea>
                </div>
                <input type="hidden" name="_gotcha" value="">
                <button type="submit" class="dark-theme-button">Send Message</button>
            </form>
        </section>
    </main>
    <footer>
        <p>© 2026 Azat Yeranosyan | Built with HTML &amp; CSS</p>
    </footer>
    <audio id="bg-audio" muted playsinline preload="auto">
        <source src="../../assets/audio/Cosmic_Hippo_lavender.mp3" type="audio/mpeg">
    </audio>
    <button id="audio-toggle" type="button" aria-label="Unmute background music" aria-pressed="false">🔇</button>
    <button id="audio-volume" type="button" aria-label="Volume 10 percent, click to change">10%</button>
    <button id="audio-next" type="button" aria-label="Next track">⏭</button>
    <script src="../js/audio.min.js" defer></script>
</body>
</html>
