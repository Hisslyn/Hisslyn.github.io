<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entering Universe | Azat Yeranosyan</title>
<meta name="referrer" content="strict-origin-when-cross-origin">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'sha256-/4Ckuap7wuRE1D60xQOMDfg1YKXpbQXSn9Nz16/kq+I='">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: #081c15; /* critical first paint — matches site exactly */
    font-family: system-ui, -apple-system, monospace;
  }
  canvas#warp {
    position: fixed; inset: 0; z-index: 0; display: block;
  }
  #bg-radial {
    position: fixed; inset: 0; z-index: 1; pointer-events: none;
  }
  #bloom {
    position: fixed; inset: 0; z-index: 2; pointer-events: none;
    background: #fff; opacity: 0;
  }
  .content {
    position: fixed; inset: 0; z-index: 3;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none;
  }
  .label {
    font-size: clamp(0.7rem, 2vw, 0.85rem);
    letter-spacing: 0.4em; text-transform: uppercase;
    opacity: 1;
  }
  .dots::after {
    content: '';
    animation: dots 1.2s steps(4, end) infinite;
  }
  @keyframes dots {
    0%   { content: ''; }
    25%  { content: '.'; }
    50%  { content: '..'; }
    75%  { content: '...'; }
  }
  #skip-link {
    position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
    z-index: 10; font-size: 0.68rem; letter-spacing: 0.25em; text-transform: uppercase;
    text-decoration: none; border-bottom: 1px solid currentColor; padding-bottom: 2px;
    opacity: 0.7; transition: opacity 0.2s;
  }
  #skip-link:hover, #skip-link:focus-visible { opacity: 1; outline: none; }

  /* reduced-motion: instant crossfade only */
  @media (prefers-reduced-motion: reduce) {
    canvas#warp { display: none; }
    #bg-radial { transition: background 0.5s ease; }
    .label { display: none; }
  }
</style>
</head>
<body>
<canvas id="warp" aria-hidden="true"></canvas>
<div id="bg-radial" aria-hidden="true"></div>
<div id="bloom" aria-hidden="true"></div>
<div class="content" aria-live="polite">
  <div class="label" id="label-text">
    <span id="label-str">initializing</span><span class="dots"></span>
  </div>
</div>
<a href="./index.html" id="skip-link">Skip</a>

<script>
(function () {
  /* ── direction ─────────────────────────────────────────── */
  var params = new URLSearchParams(window.location.search);
  var toHome = params.get('to') === 'home';

  if (toHome) {
    localStorage.setItem('bgAudioMuted', 'true');
  }

  var dest = toHome ? '../src/pages/index.html' : './index.html';
  var skipEl = document.getElementById('skip-link');
  skipEl.href = dest;

  /* ── palette ────────────────────────────────────────────
     green site palette  →  universe palette
     bg:     #081c15     →  #050814
     mid:    #1b4332     →  #0a0f2e
     accent: #18b96e     →  #4ad6ff
     acc2:                   #a78bff
  ────────────────────────────────────────────────────────── */
  function hexToRgb(h) {
    var r = parseInt(h.slice(1,3),16),
        g = parseInt(h.slice(3,5),16),
        b = parseInt(h.slice(5,7),16);
    return [r,g,b];
  }
  function lerpColor(a, b, t) {
    return [
      Math.round(a[0] + (b[0]-a[0])*t),
      Math.round(a[1] + (b[1]-a[1])*t),
      Math.round(a[2] + (b[2]-a[2])*t)
    ];
  }
  function rgb(c) { return 'rgb('+c[0]+','+c[1]+','+c[2]+')'; }

  var GREEN_BG   = hexToRgb('#081c15');
  var GREEN_MID  = hexToRgb('#1b4332');
  var GREEN_ACC  = hexToRgb('#18b96e');
  var UNI_BG     = hexToRgb('#050814');
  var UNI_MID    = hexToRgb('#0a0f2e');
  var UNI_ACC    = hexToRgb('#4ad6ff');
  var UNI_ACC2   = hexToRgb('#a78bff');

  /* ── cubic easing ──────────────────────────────────────── */
  function easeInCubic(t)    { return t*t*t; }
  function easeOutCubic(t)   { var u=1-t; return 1 - u*u*u; }
  function easeInOutCubic(t) { return t<0.5 ? 4*t*t*t : 1-Math.pow(-2*t+2,3)/2; }

  /* ── reduced-motion shortcut ────────────────────────────── */
  var reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if (reduced) {
    var bgEl = document.getElementById('bg-radial');
    if (toHome) {
      bgEl.style.background = 'radial-gradient(ellipse at 50% 50%, '+rgb(UNI_MID)+' 0%, '+rgb(UNI_BG)+' 70%)';
      document.body.style.background = rgb(UNI_BG);
      document.getElementById('label-text').style.color = rgb(UNI_ACC);
      skipEl.style.color = '#7e88b8';
    } else {
      bgEl.style.background = 'radial-gradient(ellipse at 50% 50%, '+rgb(GREEN_MID)+' 0%, '+rgb(GREEN_BG)+' 70%)';
      document.body.style.background = rgb(GREEN_BG);
      document.getElementById('label-text').style.color = rgb(GREEN_ACC);
      skipEl.style.color = '#7aab8b';
    }
    setTimeout(function () {
      bgEl.style.transition = 'background 0.5s ease';
      document.body.style.transition = 'background 0.5s ease';
      if (toHome) {
        bgEl.style.background = 'radial-gradient(ellipse at 50% 50%, '+rgb(GREEN_MID)+' 0%, '+rgb(GREEN_BG)+' 70%)';
        document.body.style.background = rgb(GREEN_BG);
      } else {
        bgEl.style.background = 'radial-gradient(ellipse at 50% 50%, '+rgb(UNI_MID)+' 0%, '+rgb(UNI_BG)+' 70%)';
        document.body.style.background = rgb(UNI_BG);
      }
      setTimeout(function () { window.location.replace(dest); }, 520);
    }, 10);
    return;
  }

  /* ── label ──────────────────────────────────────────────── */
  var labelStr = document.getElementById('label-str');
  var labelEl  = document.getElementById('label-text');
  if (toHome) {
    labelStr.textContent = 'returning home';
  } else {
    labelStr.textContent = 'entering the universe';
  }

  /* ── canvas setup ───────────────────────────────────────── */
  var canvas = document.getElementById('warp');
  var ctx    = canvas.getContext('2d');
  var W, H, cx, cy, dpr;

  function resize() {
    dpr    = Math.min(window.devicePixelRatio || 1, 2);
    W      = window.innerWidth;
    H      = window.innerHeight;
    cx     = W / 2;
    cy     = H / 2;
    canvas.width  = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width  = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  resize();
  window.addEventListener('resize', resize);

  /* ── star pool ──────────────────────────────────────────── */
  var MAX_STARS = 320;
  var stars = [];

  function mkStar() {
    var angle  = Math.random() * Math.PI * 2;
    var radius = Math.random() * 0.3 + 0.02; /* 0.02–0.32 of screen half-diagonal */
    var speed  = Math.random() * 0.004 + 0.001;
    return { angle: angle, r: radius, speed: speed, size: Math.random() * 1.4 + 0.3, alpha: Math.random() * 0.5 + 0.3 };
  }

  for (var i = 0; i < MAX_STARS; i++) {
    stars.push(mkStar());
  }

  /* ── timing ─────────────────────────────────────────────── */
  /* to=universe: 3.5 s total
     0.0 – 0.7  settle
     0.7 – 2.0  ignite + morph
     2.0 – 3.1  warp
     3.1 – 3.5  arrival / bloom
  */
  var TOTAL      = 3500;  /* ms */
  var T_IGNITE   = 700;
  var T_WARP     = 2000;
  var T_BLOOM    = 3100;

  /* to=home is the reverse: same phases, same proportions, mirrored palette direction */

  var bgEl    = document.getElementById('bg-radial');
  var bloomEl = document.getElementById('bloom');

  var raf = null;
  var startTime = null;
  var navigated = false;

  function navigate() {
    if (navigated) return;
    navigated = true;
    if (raf) { cancelAnimationFrame(raf); raf = null; }
    window.removeEventListener('resize', resize);
    window.location.replace(dest);
  }

  function drawFrame(now) {
    if (!startTime) startTime = now;
    var elapsed = now - startTime;
    var tTotal  = Math.min(elapsed / TOTAL, 1);

    /* ── per-phase progress ───────────────────────────────── */
    var tSettle, tIgnite, tWarp, tBloom;
    tSettle = Math.min(elapsed / T_IGNITE, 1);
    tIgnite = elapsed > T_IGNITE ? Math.min((elapsed - T_IGNITE) / (T_WARP - T_IGNITE), 1) : 0;
    tWarp   = elapsed > T_WARP   ? Math.min((elapsed - T_WARP)   / (T_BLOOM - T_WARP),  1) : 0;
    tBloom  = elapsed > T_BLOOM  ? Math.min((elapsed - T_BLOOM)  / (TOTAL - T_BLOOM),    1) : 0;

    tSettle = easeOutCubic(tSettle);
    tIgnite = easeInOutCubic(tIgnite);
    tWarp   = easeInCubic(tWarp);
    tBloom  = easeOutCubic(tBloom);

    /* palette interpolation progress (0 = green, 1 = universe) */
    var palT = toHome
      ? 1 - easeInOutCubic(tTotal)
      : easeInOutCubic(tTotal);

    var bgColor  = lerpColor(GREEN_BG, UNI_BG, palT);
    var midColor = lerpColor(GREEN_MID, UNI_MID, palT);
    document.body.style.background = rgb(bgColor);
    bgEl.style.background = 'radial-gradient(ellipse at 50% 50%, '+rgb(midColor)+' 0%, '+rgb(bgColor)+' 72%)';

    /* ── label color ──────────────────────────────────────── */
    var lblColor = toHome
      ? lerpColor(UNI_ACC, GREEN_ACC, easeInOutCubic(tTotal))
      : lerpColor(GREEN_ACC, UNI_ACC, easeInOutCubic(tTotal));
    labelEl.style.color = rgb(lblColor);

    /* ── star tint: green-ish → white → cool blue ──────────── */
    var starTint = toHome
      ? lerpColor(UNI_ACC, GREEN_ACC, easeInOutCubic(tTotal))
      : lerpColor(GREEN_ACC, [220,240,255], palT);

    /* ── warp factor: how far stars have "stretched" ─────────
       0 = dots, 1 = full long streaks                        */
    var warpFactor = tWarp;

    /* ── max radial extent (fraction of half-diagonal) ───────
       settles from 0.32 → spreads outward during warp        */
    var diagHalf = Math.sqrt(cx*cx + cy*cy);

    /* clear */
    ctx.clearRect(0, 0, W, H);

    /* glow at center during settle / ignite */
    if (tSettle > 0.05 && tWarp < 0.98) {
      var glowRadius = (1 - easeInCubic(warpFactor)) * 60 * easeOutCubic(tSettle) + 4;
      var glowAlpha  = (1 - warpFactor) * 0.55 * easeOutCubic(tSettle);
      var glowColor  = toHome ? UNI_ACC : GREEN_ACC;
      var glowGrad   = ctx.createRadialGradient(cx, cy, 0, cx, cy, glowRadius * 1.8);
      glowGrad.addColorStop(0,   'rgba('+glowColor[0]+','+glowColor[1]+','+glowColor[2]+','+glowAlpha.toFixed(3)+')');
      glowGrad.addColorStop(0.4, 'rgba('+glowColor[0]+','+glowColor[1]+','+glowColor[2]+','+(glowAlpha*0.4).toFixed(3)+')');
      glowGrad.addColorStop(1,   'rgba('+glowColor[0]+','+glowColor[1]+','+glowColor[2]+',0)');
      ctx.fillStyle = glowGrad;
      ctx.beginPath();
      ctx.arc(cx, cy, glowRadius * 1.8, 0, Math.PI*2);
      ctx.fill();
    }

    /* draw stars */
    for (var s = 0; s < stars.length; s++) {
      var st = stars[s];

      /* update radial position: outward drift always; during warp accelerates */
      var drift = st.speed * (1 + easeInCubic(warpFactor) * 18);
      if (toHome) {
        /* stars travel inward when returning home */
        st.r -= drift * (1 / 60);
        if (st.r < 0.005) {
          st.r    = 0.45 + Math.random() * 0.55;
          st.angle = Math.random() * Math.PI * 2;
        }
      } else {
        st.r += drift * (1 / 60);
        if (st.r > 1.0) {
          st.r     = 0.005 + Math.random() * 0.02;
          st.angle = Math.random() * Math.PI * 2;
        }
      }

      /* star position */
      var sx = cx + Math.cos(st.angle) * st.r * diagHalf;
      var sy = cy + Math.sin(st.angle) * st.r * diagHalf;

      /* skip off-screen */
      if (sx < -4 || sx > W+4 || sy < -4 || sy > H+4) continue;

      /* streak length: 0 at no warp, grows with warpFactor */
      var streakLen = warpFactor > 0.05
        ? easeInCubic(warpFactor) * st.r * diagHalf * 0.22
        : 0;

      var alpha = st.alpha * (0.3 + 0.7 * Math.min(st.r / 0.15, 1)) * (1 - tBloom * 0.6);

      ctx.strokeStyle = 'rgba('+starTint[0]+','+starTint[1]+','+starTint[2]+','+alpha.toFixed(3)+')';
      ctx.lineWidth   = st.size * (1 + easeInCubic(warpFactor) * 1.2);
      ctx.lineCap     = 'round';
      ctx.beginPath();

      if (streakLen > 1.5) {
        /* streak from current pos back toward center */
        var tailAngle = st.angle + Math.PI;
        var ex = sx + Math.cos(tailAngle) * streakLen;
        var ey = sy + Math.sin(tailAngle) * streakLen;
        ctx.moveTo(sx, sy);
        ctx.lineTo(ex, ey);
      } else {
        ctx.arc(sx, sy, st.size * 0.5, 0, Math.PI*2);
      }
      ctx.stroke();
    }

    /* bloom flash overlay */
    if (tBloom > 0) {
      var bloomAlpha = tBloom < 0.5
        ? easeInCubic(tBloom * 2) * 0.88
        : easeOutCubic(1 - (tBloom - 0.5) * 2) * 0.88;
      bloomEl.style.opacity = bloomAlpha.toFixed(3);

      /* navigate as bloom peaks (tBloom ≈ 0.45–0.55) */
      if (tBloom >= 0.45 && !navigated) {
        navigate();
        return;
      }
    }

    /* label fade during warp and bloom */
    var lblAlpha = tWarp > 0 ? Math.max(0, 1 - easeInCubic(tWarp * 1.5)) : 1;
    labelEl.style.opacity = lblAlpha.toFixed(3);

    raf = requestAnimationFrame(drawFrame);
  }

  raf = requestAnimationFrame(drawFrame);

  /* safety fallback */
  setTimeout(navigate, TOTAL + 800);

})();
</script>
</body>
</html>
