<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entering Universe | Azat Yeranosyan</title>
<meta name="referrer" content="strict-origin-when-cross-origin">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'sha256-ZdWYXfepABCVN0ngv/1mJRHhsWzGgCjaUwnyT/6IAvM=' 'sha256-vUc0E1ZIlMkPmAqGd6TTPMqERfmQeTTNQapz9M8ZZaA='; style-src 'self' 'unsafe-inline'">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%; overflow: hidden;
  background: #081c15; /* critical first paint — green base, no white flash */
  font-family: ui-monospace, 'Cascadia Code', 'Source Code Pro', Menlo, Consolas, 'DejaVu Sans Mono', monospace;
  color: #18b96e;
}
#bg {
  position: fixed; inset: 0; z-index: 0;
  background: #081c15;
}
canvas#warp {
  position: fixed; inset: 0; z-index: 1; display: block;
}
#bloom {
  position: fixed; inset: 0; z-index: 2; pointer-events: none;
  background: #fff; opacity: 0; will-change: opacity;
}
#status-wrap {
  position: fixed; inset: 0; z-index: 3;
  display: flex; flex-direction: column;
  align-items: center; justify-content: flex-end;
  padding-bottom: 5.5rem; pointer-events: none;
}
#status-text {
  font-size: clamp(0.6rem, 1.6vw, 0.78rem);
  letter-spacing: 0.38em; text-transform: uppercase;
  opacity: 0; transition: opacity 0.4s;
  will-change: opacity, color;
}
#progress-arc {
  margin-top: 0.85rem;
  opacity: 0; transition: opacity 0.4s;
}
#skip-link {
  position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
  z-index: 10; font-size: 0.65rem; letter-spacing: 0.28em; text-transform: uppercase;
  text-decoration: none; border-bottom: 1px solid currentColor; padding-bottom: 2px;
  opacity: 0.65; transition: opacity 0.2s, color 0.2s;
  will-change: color;
}
#skip-link:hover, #skip-link:focus-visible { opacity: 1; outline: 2px solid currentColor; outline-offset: 3px; }

/* reduced-motion: OKLab CSS dissolve, no canvas */
@media (prefers-reduced-motion: reduce) {
  canvas#warp { display: none; }
  #bg { transition: background 0.5s ease; }
  #status-text, #progress-arc { display: none; }
}
</style>
<script>if(location.search.indexOf('to=home')!==-1)document.documentElement.style.background='#050814'</script>
</head>
<body>
<div id="bg" aria-hidden="true"></div>
<canvas id="warp" aria-hidden="true"></canvas>
<div id="bloom" aria-hidden="true"></div>
<div id="status-wrap">
  <div id="status-text" aria-live="polite" role="status"></div>
  <svg id="progress-arc" width="48" height="48" viewBox="0 0 48 48" aria-hidden="true">
    <circle cx="24" cy="24" r="19" fill="none" stroke="currentColor" stroke-width="1.2"
            stroke-dasharray="119.38" stroke-dashoffset="119.38" stroke-linecap="round"
            transform="rotate(-90 24 24)" id="arc-circle" opacity="0.45"/>
  </svg>
</div>
<a href="./index.html" id="skip-link">Skip</a>

<script>
(function () {
  /* ── direction ───────────────────────────────────────────────── */
  var params = new URLSearchParams(window.location.search);
  var toHome = params.get('to') === 'home';

  /* Write mute key BEFORE anything else for to=home */
  if (toHome) {
    localStorage.setItem('bgAudioMuted', 'true');
  }

  var dest = toHome ? '../src/pages/index.html' : './index.html';
  var skipEl = document.getElementById('skip-link');
  skipEl.href = dest;

  /* ── palette values from nexus.css ──────────────────────────────
     Universe palette:  --bg #050814  --c1 #4ad6ff  --c2 #a78bff  --muted #7e88b8
     Green site palette: bg #081c15  mid #1b4332  accent #18b96e  muted #7aab8b
  ───────────────────────────────────────────────────────────────── */

  /* ── OKLab colour math (Ottosson) ───────────────────────────── */
  function srgbToLinear(v) {
    v = v / 255;
    return v <= 0.04045 ? v / 12.92 : Math.pow((v + 0.055) / 1.055, 2.4);
  }
  function linearToSrgb(v) {
    return Math.round(255 * (v <= 0.0031308 ? 12.92 * v : 1.055 * Math.pow(v, 1/2.4) - 0.055));
  }
  function hexToOklab(hex) {
    var r = srgbToLinear(parseInt(hex.slice(1,3),16));
    var g = srgbToLinear(parseInt(hex.slice(3,5),16));
    var b = srgbToLinear(parseInt(hex.slice(5,7),16));
    var l = Math.cbrt(0.4122214708*r + 0.5363325363*g + 0.0514459929*b);
    var m = Math.cbrt(0.2119034982*r + 0.6806995451*g + 0.1073969566*b);
    var s = Math.cbrt(0.0883024619*r + 0.2817188376*g + 0.6299787005*b);
    return [
      0.2104542553*l + 0.7936177850*m - 0.0040720468*s,
      1.9779984951*l - 2.4285922050*m + 0.4505937099*s,
      0.0259040371*l + 0.7827717662*m - 0.8086757660*s
    ];
  }
  function oklabToHex(lab) {
    var L=lab[0], A=lab[1], B=lab[2];
    var l = L + 0.3963377774*A + 0.2158037573*B;
    var m = L - 0.1055613458*A - 0.0638541728*B;
    var s = L - 0.0894841775*A - 1.2914855480*B;
    l=l*l*l; m=m*m*m; s=s*s*s;
    var r = linearToSrgb( 4.0767416621*l - 3.3077115913*m + 0.2309699292*s);
    var g = linearToSrgb(-1.2684380046*l + 2.6097574011*m - 0.3413193965*s);
    var b = linearToSrgb(-0.0041960863*l - 0.7034186147*m + 1.7076147010*s);
    r=Math.max(0,Math.min(255,r));
    g=Math.max(0,Math.min(255,g));
    b=Math.max(0,Math.min(255,b));
    return [r,g,b];
  }
  function lerpOklab(a,b,t) {
    return [a[0]+(b[0]-a[0])*t, a[1]+(b[1]-a[1])*t, a[2]+(b[2]-a[2])*t];
  }
  function mixHex(hexA,hexB,t) {
    return oklabToHex(lerpOklab(hexToOklab(hexA),hexToOklab(hexB),t));
  }
  function rgb(c) { return 'rgb('+c[0]+','+c[1]+','+c[2]+')'; }

  /* palette hexes */
  var G_BG   = '#081c15';
  var G_MID  = '#1b4332';
  var G_ACC  = '#18b96e';
  var U_BG   = '#050814';
  var U_MID  = '#0a0f2e';
  var U_ACC  = '#4ad6ff';

  /* ── easing ─────────────────────────────────────────────────── */
  function easeOut3(t)    { var u=1-t; return 1-u*u*u; }
  function easeIn3(t)     { return t*t*t; }
  function easeInOut3(t)  { return t<0.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2; }
  function easeOutExpo(t) { return t>=1?1:1-Math.pow(2,-10*t); }
  function easeInExpo(t)  { return t<=0?0:Math.pow(2,10*t-10); }

  /* ── reduced-motion path ─────────────────────────────────────── */
  var reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if (reduced) {
    var bgEl = document.getElementById('bg');
    /* set starting palette */
    var rmBgFrom = toHome ? U_BG  : G_BG;
    var rmBgTo   = toHome ? G_BG  : U_BG;
    var rmFgFrom = toHome ? U_ACC : G_ACC;
    var rmFgTo   = toHome ? G_ACC : U_ACC;
    bgEl.style.background = rmBgFrom;
    document.body.style.background = rmBgFrom;
    skipEl.style.color = rgb(hexToOklab ? oklabToHex(hexToOklab(rmFgFrom)) : [120,160,180]);
    /* OKLab dissolve via rAF over ~450ms */
    var rmStart = null;
    var rmDur = 350;
    var navigated = false;
    function navigate() {
      if (navigated) return;
      navigated = true;
      window.location.replace(dest);
    }
    function rmFrame(now) {
      if (!rmStart) rmStart = now;
      var t = Math.min((now - rmStart) / rmDur, 1);
      var et = easeInOut3(t);
      var bg = rgb(mixHex(rmBgFrom, rmBgTo, et));
      bgEl.style.background = bg;
      document.body.style.background = bg;
      var fc = rgb(mixHex(rmFgFrom, rmFgTo, et));
      skipEl.style.color = fc;
      if (t < 1) requestAnimationFrame(rmFrame);
      else setTimeout(navigate, 30);
    }
    requestAnimationFrame(rmFrame);
    setTimeout(navigate, rmDur + 200);
    return;
  }

  /* ── canvas setup ────────────────────────────────────────────── */
  var canvas = document.getElementById('warp');
  var ctx = null;
  try { ctx = canvas.getContext('2d'); } catch(e) {}
  if (!ctx) {
    /* fallback: reduced-motion-style dissolve */
    reduced = true;
    setTimeout(function(){window.location.replace(dest);}, 600);
    return;
  }

  var W, H, cx, cy, dpr;
  function resize() {
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth;
    H = window.innerHeight;
    cx = W / 2;
    cy = H / 2;
    canvas.width  = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width  = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  resize();

  var onResize = function() { resize(); };
  window.addEventListener('resize', onResize);

  /* ── grain texture (anti-banding) ───────────────────────────── */
  var grainCanvas = document.createElement('canvas');
  var grainCtx = grainCanvas.getContext('2d');
  var GRAIN_SIZE = 256;
  grainCanvas.width = grainCanvas.height = GRAIN_SIZE;
  var grainData = grainCtx.createImageData(GRAIN_SIZE, GRAIN_SIZE);
  /* pre-fill with random noise, greyscale */
  for (var gi = 0; gi < grainData.data.length; gi += 4) {
    var gv = (Math.random() * 40) | 0;
    grainData.data[gi]   = gv;
    grainData.data[gi+1] = gv;
    grainData.data[gi+2] = gv;
    grainData.data[gi+3] = 255;
  }
  grainCtx.putImageData(grainData, 0, 0);

  /* ── star pool (Float32Array layout) ────────────────────────────
     Fields per star (7 floats): x y z prevProjX prevProjY speed size
  ───────────────────────────────────────────────────────────────── */
  var MAX_STARS = 380;
  var STRIDE    = 7;
  var starBuf   = new Float32Array(MAX_STARS * STRIDE);
  var FOCAL     = 600; /* perspective focal length */

  function spawnStar(i, fromEdge) {
    var base = i * STRIDE;
    var angle = Math.random() * Math.PI * 2;
    var dist  = fromEdge
      ? (0.5 + Math.random() * 0.5)  /* spawn far when toHome (inward) */
      : (Math.random() * 0.15);      /* spawn near centre for outward warp */
    var diagHalf = Math.sqrt(cx*cx + cy*cy);
    var rx = Math.cos(angle) * dist * diagHalf;
    var ry = Math.sin(angle) * dist * diagHalf;
    var z  = fromEdge ? (0.1 + Math.random() * 0.9) : (0.6 + Math.random() * 0.4);
    /* depth band: 0=near 1=far */
    starBuf[base]   = rx;            /* x (world offset from center) */
    starBuf[base+1] = ry;            /* y */
    starBuf[base+2] = z;             /* z: 0=closest, 1=far */
    starBuf[base+3] = cx + rx / (z + 0.001) * (FOCAL / 600); /* prevProjX init */
    starBuf[base+4] = cy + ry / (z + 0.001) * (FOCAL / 600); /* prevProjY init */
    starBuf[base+5] = 0.4 + Math.random() * 0.6; /* speed scalar */
    starBuf[base+6] = 0.5 + Math.random() * 1.0; /* size */
  }

  for (var si = 0; si < MAX_STARS; si++) {
    spawnStar(si, toHome);
  }

  /* ── timeline ─────────────────────────────────────────────────
     to=universe (~2.4s total):
       0.00 – 0.45  Settle:   green glow contracts, stars begin spawning
       0.35 – 1.45  Ignite:   starfield fades in, palette morphs, glow shrinks
       1.40 – 2.15  Warp:     stars accelerate, trails stretch, chrAb grows
       2.10 – 2.40  Arrival:  single bloom rise+fall ~300ms, navigate at crest
     to=home (~2.1s total):
       same engine, palette reversed, stars collapse inward, no bloom (gentle settle)
  ───────────────────────────────────────────────────────────────── */
  var TOTAL  = 2400;
  var T_IGN  = 350;  /* ignite phase starts */
  var T_WARP = 1400; /* warp phase starts */
  var T_BLOM = 2100; /* bloom phase starts */
  var T_NAV  = 2300; /* navigate at bloom crest */

  var bgEl    = document.getElementById('bg');
  var bloomEl = document.getElementById('bloom');
  var statusEl   = document.getElementById('status-text');
  var arcCircle  = document.getElementById('arc-circle');
  var progWrap   = document.getElementById('progress-arc');
  var ARC_FULL   = 119.38; /* 2π * 19 */

  /* set initial label */
  statusEl.textContent = toHome ? 'returning home' : 'aligning';
  statusEl.style.opacity = '1';
  progWrap.style.opacity = '1';
  skipEl.style.color = toHome ? rgb(oklabToHex(hexToOklab(U_ACC))) : rgb(oklabToHex(hexToOklab(G_ACC)));

  var raf       = null;
  var startTime = null;
  var navigated = false;
  var hidden    = false;
  var hiddenAt  = 0;
  var pausedElapsed = 0;

  function navigate() {
    if (navigated) return;
    navigated = true;
    if (raf) { cancelAnimationFrame(raf); raf = null; }
    window.removeEventListener('resize', onResize);
    document.removeEventListener('visibilitychange', onVis);
    window.location.replace(dest);
  }

  /* prefetch destination assets (same-origin only) */
  function prefetchDest() {
    if (toHome) {
      var lnk = document.createElement('link');
      lnk.rel = 'prefetch'; lnk.href = '../src/pages/index.html'; lnk.as = 'document';
      document.head.appendChild(lnk);
    } else {
      ['./index.html','./nexus.css','./nexus.js'].forEach(function(href) {
        var lnk = document.createElement('link');
        lnk.rel = 'prefetch'; lnk.href = href;
        document.head.appendChild(lnk);
      });
    }
  }

  function onVis() {
    if (document.visibilityState === 'hidden') {
      hidden = true;
      hiddenAt = performance.now();
      if (raf) { cancelAnimationFrame(raf); raf = null; }
    } else {
      if (hidden) {
        /* shift startTime forward by the time hidden so timeline doesn't jump */
        startTime += performance.now() - hiddenAt;
        hidden = false;
        raf = requestAnimationFrame(drawFrame);
      }
    }
  }
  document.addEventListener('visibilitychange', onVis);

  var prefetchFired = false;
  var lastPhaseLabel = '';

  function setLabel(str) {
    if (str !== lastPhaseLabel) {
      lastPhaseLabel = str;
      statusEl.textContent = str;
    }
  }

  /* chromatic aberration offsets — grows near end of warp */
  var caAmount = 0;

  function drawFrame(now) {
    if (!startTime) startTime = now;
    var elapsed = Math.min(now - startTime, TOTAL + 500);
    var dt = Math.min(elapsed - (drawFrame._prevElapsed || 0), 50);
    drawFrame._prevElapsed = elapsed;

    /* ── per-phase progress 0→1 ────────────────────────────── */
    function phaseT(start, end) {
      if (elapsed <= start) return 0;
      if (elapsed >= end)   return 1;
      return (elapsed - start) / (end - start);
    }

    var tSettle  = easeOut3(phaseT(0, 450));
    var tIgnite  = easeInOut3(phaseT(T_IGN, 1450));
    var tWarp    = easeInExpo(phaseT(T_WARP, 2150));
    var tBloom   = phaseT(T_BLOM, T_BLOM + 300); /* raw 0→1 for bloom envelope */
    var tTotal   = Math.min(elapsed / TOTAL, 1);

    /* palette t: 0=green, 1=universe */
    var palT = toHome
      ? 1 - easeInOut3(tTotal)
      : easeInOut3(tTotal);

    /* label phases */
    if (!toHome) {
      if (elapsed < 450)   setLabel('aligning');
      else if (elapsed < T_WARP) setLabel('warp charging');
      else if (elapsed < T_BLOM) setLabel('warp');
      else                       setLabel('arrival');
    }

    /* progress arc */
    var arcT = tTotal;
    arcCircle.style.strokeDashoffset = (ARC_FULL * (1 - arcT)).toFixed(2);
    /* arc color follows palette */
    var arcCol = rgb(mixHex(G_ACC, U_ACC, palT));
    arcCircle.style.stroke = arcCol;
    statusEl.style.color   = arcCol;
    skipEl.style.color     = arcCol;

    /* fade out label/arc before bloom */
    var uiFade = tWarp > 0 ? Math.max(0, 1 - easeIn3(tWarp * 1.4)) : 1;
    statusEl.style.opacity = (uiFade).toFixed(3);
    progWrap.style.opacity = (uiFade).toFixed(3);

    /* ── background (OKLab gradient) ──────────────────────── */
    var bgCenter = rgb(mixHex(G_MID, U_MID, palT));
    var bgEdge   = rgb(mixHex(G_BG,  U_BG,  palT));
    bgEl.style.background = 'radial-gradient(ellipse at 50% 50%, '+bgCenter+' 0%, '+bgEdge+' 70%)';
    /* body bg ensures no gap if canvas is smaller during resize */
    document.body.style.background = bgEdge;

    /* ── chromatic aberration magnitude ──────────────────── */
    caAmount = tWarp > 0.65 ? easeIn3((tWarp - 0.65) / 0.35) * 6.0 : 0;

    /* ── canvas clear: low-alpha fill for trail decay ───────
       Use 'source-over' with alpha fill instead of clearRect so trails decay naturally */
    var trailDecay = toHome
      ? 0.12 + tWarp * 0.08
      : 0.08 + tWarp * 0.15;
    ctx.globalCompositeOperation = 'source-over';
    ctx.globalAlpha = trailDecay;
    ctx.fillStyle = bgEdge;
    ctx.fillRect(0, 0, W, H);
    ctx.globalAlpha = 1;

    /* ── glow at centre (settle + ignite phases) ──────────── */
    if (tSettle > 0.05 && tWarp < 0.92) {
      var glowShrink = 1 - easeIn3(tWarp);
      var glowR  = glowShrink * 70 * easeOut3(tSettle) + 3;
      var glowA  = glowShrink * 0.5 * easeOut3(tSettle) * (toHome ? 1 : easeOut3(tIgnite + 0.3));
      glowA = Math.min(glowA, 0.6);
      var glowHex = toHome ? U_ACC : G_ACC;
      var gc = hexToOklab(glowHex);
      var glowRgb = oklabToHex(gc);
      var glowGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, glowR * 2.0);
      glowGrad.addColorStop(0,   'rgba('+glowRgb[0]+','+glowRgb[1]+','+glowRgb[2]+','+glowA.toFixed(3)+')');
      glowGrad.addColorStop(0.45,'rgba('+glowRgb[0]+','+glowRgb[1]+','+glowRgb[2]+','+(glowA*0.35).toFixed(3)+')');
      glowGrad.addColorStop(1,   'rgba('+glowRgb[0]+','+glowRgb[1]+','+glowRgb[2]+',0)');
      ctx.globalCompositeOperation = 'lighter';
      ctx.fillStyle = glowGrad;
      ctx.beginPath();
      ctx.arc(cx, cy, glowR * 2.0, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalCompositeOperation = 'source-over';
    }

    /* ── stars ──────────────────────────────────────────────── */
    /* star visibility: fades in during ignite */
    var starVisibility = tIgnite;
    if (starVisibility < 0.01 && !toHome) {
      /* skip star drawing during early settle */
    } else {
      /* speed factor: base + warp acceleration */
      var baseSpeed = toHome ? 0.00025 : 0.00018;
      var warpBoost = toHome
        ? (1 + easeOutExpo(tWarp) * 10)  /* inward collapse */
        : (1 + easeInExpo(tWarp) * 20);  /* outward burst */
      var speedMult = baseSpeed * warpBoost * dt;

      /* star tint: OKLab lerp green->white->cool */
      var starTintHex = mixHex(G_ACC, U_ACC, palT);
      /* near white during warp peak */
      var whiteMix = easeIn3(tWarp * 0.8);
      var starTintFinal = mixHex(
        '#' + starTintHex.map(function(v){ return ('0'+v.toString(16)).slice(-2); }).join(''),
        '#d4e8ff',
        whiteMix
      );

      var diagHalf = Math.sqrt(cx*cx + cy*cy);

      for (var si2 = 0; si2 < MAX_STARS; si2++) {
        var base = si2 * STRIDE;
        var sx  = starBuf[base];
        var sy  = starBuf[base+1];
        var sz  = starBuf[base+2];
        var ppx = starBuf[base+3];
        var ppy = starBuf[base+4];
        var spd = starBuf[base+5];
        var ssz = starBuf[base+6];

        /* save previous projection */
        var prevPx = ppx;
        var prevPy = ppy;

        /* move in z-depth: outward = z decreases (comes toward camera)
           depth bands: spd scalar creates parallax */
        var zStep = speedMult * spd * (0.5 + sz * 0.5);
        if (toHome) {
          /* inward: z increases (recedes), x/y also contract slightly */
          sz += zStep;
          sx *= (1 - zStep * 0.3);
          sy *= (1 - zStep * 0.3);
          if (sz > 1.2 || Math.abs(sx) < 0.5 && Math.abs(sy) < 0.5 && sz > 0.9) {
            spawnStar(si2, true);
            continue;
          }
        } else {
          /* outward: z decreases */
          sz -= zStep;
          /* recycle when past camera */
          if (sz <= 0.005) {
            spawnStar(si2, false);
            continue;
          }
        }

        /* perspective projection */
        var scale = FOCAL / (sz * diagHalf + FOCAL * 0.01);
        var projX = cx + sx * scale;
        var projY = cy + sy * scale;

        /* update buffer */
        starBuf[base]   = sx;
        starBuf[base+1] = sy;
        starBuf[base+2] = sz;
        starBuf[base+3] = projX;
        starBuf[base+4] = projY;

        /* skip off-screen */
        if (projX < -8 || projX > W+8 || projY < -8 || projY > H+8) continue;

        /* alpha: fade in with ignite, dim near bloom */
        var depthAlpha = 0.3 + (1 - sz) * 0.7;
        var sAlpha = starVisibility * depthAlpha * (1 - tBloom * 0.7);
        if (sAlpha < 0.02) continue;

        /* streak */
        var dx = projX - prevPx;
        var dy = projY - prevPy;
        var streakLen = Math.sqrt(dx*dx + dy*dy);

        ctx.globalCompositeOperation = 'lighter';

        if (caAmount > 0.3 && tWarp > 0.7) {
          /* chromatic aberration: draw R, G, B separately */
          var caOff = caAmount;
          var normDx = streakLen > 0.1 ? dx / streakLen : 0;
          var normDy = streakLen > 0.1 ? dy / streakLen : 0;
          ctx.lineWidth = ssz * (0.8 + tWarp * 0.8);
          ctx.lineCap = 'round';
          /* red channel */
          ctx.strokeStyle = 'rgba(255,80,80,' + (sAlpha * 0.55).toFixed(3) + ')';
          ctx.beginPath();
          ctx.moveTo(prevPx + normDx * caOff, prevPy + normDy * caOff);
          ctx.lineTo(projX  + normDx * caOff, projY  + normDy * caOff);
          ctx.stroke();
          /* blue channel */
          ctx.strokeStyle = 'rgba(80,140,255,' + (sAlpha * 0.55).toFixed(3) + ')';
          ctx.beginPath();
          ctx.moveTo(prevPx - normDx * caOff, prevPy - normDy * caOff);
          ctx.lineTo(projX  - normDx * caOff, projY  - normDy * caOff);
          ctx.stroke();
        }

        /* main star */
        var sc = starTintFinal;
        ctx.strokeStyle = 'rgba('+sc[0]+','+sc[1]+','+sc[2]+','+sAlpha.toFixed(3)+')';
        ctx.lineWidth   = ssz * (0.7 + easeIn3(tWarp) * 1.4);
        ctx.lineCap     = 'round';
        ctx.beginPath();
        if (streakLen > 1.5) {
          ctx.moveTo(prevPx, prevPy);
          ctx.lineTo(projX,  projY);
        } else {
          ctx.arc(projX, projY, ssz * 0.45, 0, Math.PI * 2);
        }
        ctx.stroke();

        ctx.globalCompositeOperation = 'source-over';
      }
    }

    /* ── grain overlay (anti-banding) ───────────────────────── */
    ctx.globalAlpha = 0.025;
    ctx.globalCompositeOperation = 'screen';
    /* tile grain across viewport */
    for (var gx = 0; gx < W; gx += GRAIN_SIZE) {
      for (var gy = 0; gy < H; gy += GRAIN_SIZE) {
        ctx.drawImage(grainCanvas, gx, gy);
      }
    }
    ctx.globalAlpha = 1;
    ctx.globalCompositeOperation = 'source-over';

    /* ── bloom (to=universe only, single rise+fall) ──────────── */
    if (!toHome && tBloom > 0) {
      /* single rise to ~0.48 then fall — total <=400ms, capped at 0.88 opacity */
      var bloomAlpha = tBloom <= 0.52
        ? easeIn3(tBloom / 0.52) * 0.88
        : easeOut3(1 - (tBloom - 0.52) / 0.48) * 0.88;
      bloomEl.style.opacity = (Math.min(bloomAlpha, 0.88)).toFixed(3);
    } else {
      bloomEl.style.opacity = '0';
    }

    /* prefetch during ignite phase */
    if (!prefetchFired && tIgnite > 0.15) {
      prefetchFired = true;
      prefetchDest();
    }

    /* navigate at bloom crest */
    if (!toHome && elapsed >= T_NAV) {
      navigate();
      return;
    }

    /* to=home: navigate when palette is mostly warm and stars have mostly collapsed */
    if (toHome && tTotal >= 0.92) {
      navigate();
      return;
    }

    raf = requestAnimationFrame(drawFrame);
  }
  drawFrame._prevElapsed = 0;

  raf = requestAnimationFrame(drawFrame);

  /* safety fallback */
  setTimeout(navigate, TOTAL + 800);

})();
</script>
</body>
</html>
